<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NorthLex — Northeast Legal Portal{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Legal services for Northeast India{% endblock %}" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0D7377',
            'primary-light': '#14A085',
            secondary: '#1A3C5E',
            accent: '#F0A500',
            'bg-main': '#F0F4F8',
            surface: '#FFFFFF',
            'text-primary': '#1A2332',
            'text-muted': '#6B7C93',
          },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            sans: ['"DM Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
      },
    }
  </script>

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <style>
    :root {
      --primary: #0D7377;
      --primary-light: #14A085;
      --secondary: #1A3C5E;
      --accent: #F0A500;
      --bg-main: #F0F4F8;
      --surface: #FFFFFF;
      --text-primary: #1A2332;
      --text-muted: #6B7C93;
      --success: #27AE60;
      --danger: #E74C3C;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg-main); color: var(--text-primary); }
    .font-display { font-family: 'Playfair Display', serif; }
    [x-cloak] { display: none !important; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body class="h-full" x-data="{ sidebarOpen: false }">

  {% if messages %}
  <div id="messages" class="fixed top-4 right-4 z-50 space-y-2 w-80">
    {% for message in messages %}
    <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 4000)"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100 translate-x-0"
         x-transition:leave-end="opacity-0 translate-x-8"
         class="flex items-start gap-3 p-4 rounded-xl shadow-lg border
           {% if message.tags == 'error' %}bg-red-50 border-red-200 text-red-800
           {% elif message.tags == 'success' %}bg-green-50 border-green-200 text-green-800
           {% elif message.tags == 'warning' %}bg-yellow-50 border-yellow-200 text-yellow-800
           {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}">
      <p class="text-sm font-medium flex-1">{{ message }}</p>
      <button @click="show = false" class="text-current opacity-60 hover:opacity-100">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  {% block body %}{% endblock %}

  {% block extra_js %}{% endblock %}
</body>
</html>
